<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CRRT 장비 점검 KB</title>
<style>
  :root {
    --apple-blue: #0071e3;
    --apple-blue-light: #e8f2fd;
    --apple-bg: #f5f5f7;
    --apple-card: #ffffff;
    --apple-text: #1d1d1f;
    --apple-text2: #6e6e73;
    --apple-text3: #aeaeb2;
    --apple-border: rgba(0,0,0,0.08);
    --apple-border2: rgba(0,0,0,0.05);
    --apple-red: #ff3b30;
    --apple-orange: #ff9500;
    --apple-green: #34c759;
    --apple-purple: #af52de;
    --apple-teal: #5ac8fa;
    --apple-shadow: 0 2px 20px rgba(0,0,0,0.06);
    --apple-shadow-lg: 0 8px 30px rgba(0,0,0,0.10);
    --r: 16px;
    --r-sm: 10px;
    --r-xs: 7px;
    --nav-h: 58px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, 'SF Pro Display', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: var(--apple-bg);
    color: var(--apple-text);
    font-size: 15px;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ─────────────────────── */
  .header {
    background: rgba(245,245,247,0.82);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    padding: 14px 20px 0;
    position: sticky; top: 0; z-index: 200;
    border-bottom: 1px solid var(--apple-border);
  }

  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }

  .app-name {
    font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
    color: var(--apple-text); line-height: 1;
  }
  .app-name-sub {
    font-size: 12px; color: var(--apple-text2); font-weight: 400;
    margin-top: 2px; letter-spacing: 0.1px;
  }

  .total-pill {
    background: var(--apple-blue);
    color: #fff; font-size: 12px; font-weight: 600;
    padding: 5px 13px; border-radius: 20px;
    letter-spacing: 0.2px;
  }

  /* ── SEARCH BAR ── */
  .search-wrap { position: relative; margin-bottom: 12px; }

  .search-icon-left {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--apple-text3); font-size: 15px; pointer-events: none;
  }

  .search-input {
    width: 100%;
    background: rgba(118,118,128,0.12);
    border: none; border-radius: 12px;
    padding: 11px 42px 11px 40px;
    font-size: 15px; color: var(--apple-text);
    outline: none;
    transition: background .18s;
  }
  .search-input:focus { background: rgba(118,118,128,0.17); }
  .search-input::placeholder { color: var(--apple-text3); }

  .search-clear {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: var(--apple-text3); border: none; border-radius: 50%;
    width: 20px; height: 20px; font-size: 11px; line-height: 20px;
    text-align: center; cursor: pointer; display: none; color: #fff;
    font-weight: 700;
  }
  .search-clear.show { display: block; }

  /* AND 힌트 */
  .search-hint {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    padding: 0 0 10px;
    font-size: 12px; color: var(--apple-text2);
  }
  .hint-example {
    background: rgba(0,113,227,0.1); color: var(--apple-blue);
    border-radius: 5px; padding: 2px 8px;
    font-size: 12px; font-weight: 500;
  }

  /* kw tags */
  .kw-row {
    display: none; flex-wrap: wrap; gap: 5px;
    padding: 8px 20px 10px; background: var(--apple-bg);
    border-bottom: 1px solid var(--apple-border);
  }
  .kw-row.show { display: flex; }
  .kw-tag {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--apple-blue-light); color: var(--apple-blue);
    border-radius: 20px; padding: 4px 11px;
    font-size: 12px; font-weight: 600;
  }

  /* ── SEGMENT CONTROL (필터) ── */
  .filters { background: var(--apple-bg); padding: 12px 20px; }

  .flabel {
    font-size: 11px; font-weight: 600; color: var(--apple-text2);
    letter-spacing: 0.3px; margin-bottom: 7px;
    text-transform: uppercase;
  }

  .seg-wrap {
    display: flex; gap: 5px; overflow-x: auto;
    scrollbar-width: none; padding-bottom: 1px;
  }
  .seg-wrap::-webkit-scrollbar { display: none; }

  .seg {
    flex-shrink: 0;
    padding: 7px 15px; border-radius: 9px;
    font-size: 13px; font-weight: 500;
    cursor: pointer; user-select: none; white-space: nowrap;
    background: rgba(118,118,128,0.10);
    color: var(--apple-text2); border: none;
    transition: all .15s ease;
  }
  .seg.on {
    background: var(--apple-blue); color: #fff;
    box-shadow: 0 2px 8px rgba(0,113,227,0.3);
  }
  .seg-dot {
    display: inline-block; width: 7px; height: 7px;
    border-radius: 50%; margin-right: 4px; vertical-align: middle;
  }

  .filter-row { margin-bottom: 10px; }
  .filter-row:last-child { margin-bottom: 0; }

  /* ── STATS BAR ── */
  .stats-bar {
    padding: 8px 20px 6px;
    font-size: 12px; color: var(--apple-text2);
    display: flex; align-items: center; justify-content: space-between;
  }
  .stats-bar b { color: var(--apple-blue); font-weight: 700; }

  /* ── CARDS ── */
  .cards { padding: 4px 16px calc(var(--nav-h) + env(safe-area-inset-bottom, 16px) + 16px); display: flex; flex-direction: column; gap: 10px; }

  .card {
    background: var(--apple-card);
    border-radius: var(--r);
    box-shadow: var(--apple-shadow);
    overflow: hidden;
    transition: box-shadow .2s;
  }
  .card:active { box-shadow: var(--apple-shadow-lg); }

  .card-head {
    display: flex; align-items: flex-start; gap: 11px;
    padding: 14px 15px 12px; cursor: pointer;
  }

  /* 알람 뱃지 - SF 스타일 */
  .abadge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 56px;
    padding: 4px 8px; border-radius: var(--r-xs);
    font-size: 11px; font-weight: 700; letter-spacing: 0.3px;
    white-space: nowrap; flex-shrink: 0; margin-top: 1px;
  }
  .aT { background: rgba(255,149,0,0.12); color: var(--apple-orange); }
  .aB { background: rgba(255,59,48,0.10); color: var(--apple-red); }
  .aP { background: rgba(0,113,227,0.10); color: var(--apple-blue); }
  .aS { background: rgba(52,199,89,0.12); color: var(--apple-green); }
  .aX { background: rgba(118,118,128,0.10); color: var(--apple-text2); }

  .card-body { flex: 1; min-width: 0; }

  .card-title {
    font-size: 14px; font-weight: 600; line-height: 1.45;
    margin-bottom: 6px; color: var(--apple-text);
  }

  .card-meta { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }

  .mtag {
    display: inline-block; padding: 2px 8px; border-radius: 5px;
    font-size: 11px; font-weight: 600;
  }
  .mdev { background: var(--apple-blue-light); color: var(--apple-blue); }
  .mcat { background: rgba(118,118,128,0.10); color: var(--apple-text2); }
  .mdate { font-size: 11px; color: var(--apple-text3); font-weight: 400; }

  .chev {
    color: var(--apple-text3); font-size: 13px; flex-shrink: 0;
    margin-top: 3px;
    transition: transform .25s cubic-bezier(.4,0,.2,1);
    display: flex; align-items: center; justify-content: center;
    width: 22px; height: 22px;
    background: rgba(118,118,128,0.10); border-radius: 50%;
  }
  .chev.open { transform: rotate(180deg); }

  .star-btn {
    background: none; border: none; cursor: pointer;
    font-size: 19px; padding: 1px; flex-shrink: 0;
    line-height: 1; margin-top: 0; opacity: .35;
    transition: opacity .15s, transform .2s cubic-bezier(.34,1.56,.64,1);
  }
  .star-btn.on { opacity: 1; }
  .star-btn:active { transform: scale(1.4); }

  /* ── CARD DETAIL ── */
  .card-detail {
    max-height: 0; overflow: hidden;
    transition: max-height .32s cubic-bezier(.4,0,.2,1);
    border-top: 0px solid var(--apple-border);
  }
  .card-detail.open {
    max-height: 600px;
    border-top: 1px solid var(--apple-border);
  }

  .card-detail-inner { padding: 16px 15px 18px; background: #fafafa; }

  .dsec { margin-bottom: 14px; }
  .dsec:last-child { margin-bottom: 0; }

  .dlabel {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 700; color: var(--apple-text2);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 7px;
  }

  .dbox {
    font-size: 14px; line-height: 1.65; color: var(--apple-text);
    background: var(--apple-card); border-radius: 12px;
    padding: 12px 14px;
    border: 1px solid var(--apple-border);
  }

  .sbox {
    font-size: 14px; line-height: 1.65; color: #1c7a38;
    background: rgba(52,199,89,0.08); border-radius: 12px;
    padding: 12px 14px;
    border: 1px solid rgba(52,199,89,0.2);
  }

  .ptags { display: flex; flex-wrap: wrap; gap: 6px; }
  .ptag {
    padding: 4px 11px; border-radius: 8px;
    background: var(--apple-blue-light); color: var(--apple-blue);
    font-size: 12px; font-weight: 500;
  }

  mark {
    background: rgba(255,214,10,0.45);
    color: inherit; border-radius: 3px; padding: 0 1px;
  }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center; padding: 60px 24px; color: var(--apple-text2);
    display: none;
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: .5; }
  .empty h3 { font-size: 18px; font-weight: 600; margin-bottom: 6px; color: var(--apple-text); }
  .empty p { font-size: 14px; }

  /* ── SUBVIEW ── */
  .subview { display: none; padding: 16px 16px calc(var(--nav-h) + env(safe-area-inset-bottom, 16px) + 20px); }
  .subview.on { display: block; }

  .sv-section-title {
    font-size: 22px; font-weight: 700; letter-spacing: -0.3px;
    margin-bottom: 16px; color: var(--apple-text);
  }

  /* ── ALARM TAB ── */
  .alarm-group { margin-bottom: 22px; }

  .alarm-group-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px;
  }
  .alarm-group-pill {
    font-size: 12px; font-weight: 700; letter-spacing: 0.5px;
    padding: 4px 12px; border-radius: 20px; display: inline-block;
  }
  .alarm-group-T { background: rgba(255,149,0,0.12); color: var(--apple-orange); }
  .alarm-group-B { background: rgba(255,59,48,0.10); color: var(--apple-red); }
  .alarm-group-P { background: rgba(0,113,227,0.10); color: var(--apple-blue); }
  .alarm-group-기타 { background: rgba(118,118,128,0.10); color: var(--apple-text2); }

  .alarm-list { background: var(--apple-card); border-radius: var(--r); overflow: hidden; box-shadow: var(--apple-shadow); }

  .alarm-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 16px; cursor: pointer;
    border-bottom: 1px solid var(--apple-border2);
    transition: background .12s;
  }
  .alarm-row:last-child { border-bottom: none; }
  .alarm-row:active { background: rgba(0,0,0,0.04); }

  .alarm-code { font-size: 15px; font-weight: 700; color: var(--apple-text); }
  .alarm-title-sm { font-size: 12px; color: var(--apple-text2); margin-top: 2px; }

  .alarm-device-tag {
    font-size: 11px; font-weight: 600; color: var(--apple-blue);
    background: var(--apple-blue-light); padding: 3px 9px; border-radius: 6px;
    flex-shrink: 0;
  }

  .alarm-arrow {
    color: var(--apple-text3); font-size: 13px; margin-left: 8px;
  }

  /* ── PARTS TAB ── */
  .parts-section { margin-bottom: 20px; }
  .parts-section-label {
    font-size: 12px; font-weight: 600; color: var(--apple-text2);
    text-transform: uppercase; letter-spacing: 0.4px;
    margin-bottom: 8px;
  }

  .parts-grid { display: flex; flex-direction: column; gap: 1px; }
  .parts-list { background: var(--apple-card); border-radius: var(--r); overflow: hidden; box-shadow: var(--apple-shadow); }

  .part-item {
    display: flex; align-items: center;
    padding: 13px 16px; cursor: pointer;
    border-bottom: 1px solid var(--apple-border2);
    transition: background .12s;
  }
  .part-item:last-child { border-bottom: none; }
  .part-item:active { background: rgba(0,0,0,0.04); }

  .part-name { flex: 1; font-size: 14px; color: var(--apple-text); font-weight: 500; }

  .part-cnt-badge {
    background: rgba(118,118,128,0.12); color: var(--apple-text2);
    border-radius: 8px; font-size: 12px; font-weight: 600;
    padding: 2px 9px; margin-right: 8px;
  }

  .part-arrow { color: var(--apple-text3); font-size: 13px; }

  /* ── FAV TAB ── */
  .fav-empty {
    text-align: center; padding: 60px 24px; color: var(--apple-text2);
  }
  .fav-empty-icon { font-size: 46px; margin-bottom: 12px; opacity: .4; }
  .fav-empty p { font-size: 14px; line-height: 1.6; }

  /* ── BOTTOM NAV ─────────────────── */
  .bnav {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: calc(var(--nav-h) + env(safe-area-inset-bottom, 0px));
    background: rgba(249,249,249,0.85);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-top: 1px solid var(--apple-border);
    display: flex; align-items: flex-start;
    padding-top: 6px;
    z-index: 200;
  }

  .bnav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 3px 4px; cursor: pointer; border: none; background: none;
    -webkit-tap-highlight-color: transparent;
  }

  .bnav-icon-wrap {
    width: 28px; height: 28px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 19px; transition: transform .15s cubic-bezier(.34,1.56,.64,1);
  }

  .bnav-label {
    font-size: 10px; font-weight: 500;
    color: var(--apple-text3);
    letter-spacing: 0.1px;
  }

  .bnav-item.on .bnav-label { color: var(--apple-blue); font-weight: 600; }
  .bnav-item.on .bnav-icon-wrap { transform: scale(1.08); }
  .bnav-item:active .bnav-icon-wrap { transform: scale(0.9); }

  /* ── TAB SEARCH AREA ── */
  #tabSearch { display: none; }
</style>
</head>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div>
      <div class="app-name">장비 KB</div>
      <div class="app-name-sub">PrisMax · PrismaFlex · TherMax</div>

  <div class="filter-row">

      <button class="seg" data-v="전원"><span class="seg-dot" style="background:#af52de"></span>전원</button>

</div>

<!-- STATS -->
<div class="stats-bar" id="statsEl">

</div>

<!-- 검색 탭 -->
<div id="tabSearch">

</div>

<!-- 즐겨찾기 탭 -->

</div>

<!-- BOTTOM NAV -->
<div class="bnav">
  <button class="bnav-item on" onclick="switchTab('search')">

  <button class="bnav-item" onclick="switchTab('alarm')">

    <div class="bnav-icon-wrap">⭐</div>

</div>

<script>

// ─── STATE ───
let sq="", ad="all", ac="all", openSet=new Set();
let curTab="search";
let favs=new Set(JSON.parse(localStorage.getItem("prismaxFavs")||"[]"));

function acls(a){
  if(!a)return"aX";
  const c=a[0].toUpperCase();
  return c==="T"?"aT":c==="B"?"aB":c==="P"?"aP":c==="S"?"aS":"aX";
}

function hl(t,q){
  if(!q)return t;
  const terms=q.trim().split(/\s+/).filter(Boolean);
  if(!terms.length)return t;
  const re=new RegExp('('+terms.map(t=>t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|')+')','gi');
  return t.replace(re,m=>`<mark>${m}</mark>`);
}

function match(c,q){
  if(!q)return true;
  const h=[c.alarm,c.title,c.symptom,c.solution,c.device,c.cat,...(c.parts||[]),...(c.tags||[])].join(" ").toLowerCase();
  const terms=q.toLowerCase().split(/\s+/).filter(Boolean);
  return terms.every(t=>h.includes(t));
}

function cardHTML(c,q){
  const o=openSet.has(c.id);
  const starred=favs.has(c.id);
  return `<div class="card" id="c${c.id}">
    <div class="card-head" onclick="tog(${c.id})">
      <span class="abadge ${acls(c.alarm)}">${c.alarm||"—"}</span>
      <div class="card-body">
        <div class="card-title">${hl(c.title,q)}</div>
        <div class="card-meta">
          <span class="mtag mdev">${c.device}</span>
          <span class="mtag mcat">${c.cat}</span>
          <span class="mdate">${c.date}</span>
        </div>
      </div>
      <button class="star-btn ${starred?'on':''}" onclick="event.stopPropagation();toggleFav(${c.id})" title="즐겨찾기">${starred?'⭐':'☆'}</button>
      <span class="chev ${o?'open':''}">▾</span>
    </div>
    <div class="card-detail ${o?'open':''}">
      <div class="card-detail-inner">
        <div class="dsec">
          <div class="dlabel">⚠️ &nbsp;증상 / 문제</div>
          <div class="dbox">${hl(c.symptom.replace(/\n/g,'<br>'),q)}</div>
        </div>
        <div class="dsec">
          <div class="dlabel">✅ &nbsp;해결 방법</div>
          <div class="sbox">${hl(c.solution.replace(/\n/g,'<br>'),q)}</div>
        </div>
        ${c.parts.length?`<div class="dsec">
          <div class="dlabel">🔩 &nbsp;관련 부품</div>
          <div class="ptags">${c.parts.map(p=>`<span class="ptag">${hl(p,q)}</span>`).join('')}</div>
        </div>`:''}
      </div>
    </div>
  </div>`;
}

function render(){
  const q=sq.trim();
  const f=D.filter(c=>{
    if(ad!=="all"&&c.device!==ad)return false;
    if(ac!=="all"&&c.cat!==ac)return false;
    return match(c,q);
  }).sort((a,b)=>b.date.localeCompare(a.date));

  document.getElementById("cnt").textContent=f.length;
  document.getElementById("totalBadge").textContent=D.length+"건";
  const el=document.getElementById("list");
  const em=document.getElementById("empty");
  if(!f.length){ el.innerHTML=""; em.style.display="block"; return; }
  em.style.display="none";
  el.innerHTML=f.map(c=>cardHTML(c,q)).join('');
}

// ─── 탭 전환 ───
function switchTab(tab){
  curTab=tab;
  const showSearch=(tab==="search");

  // subview on/off
  ["alarm","parts","fav"].forEach(t=>{
    const el=document.getElementById("tab"+t.charAt(0).toUpperCase()+t.slice(1));
    if(el) el.classList.toggle("on",t===tab);
  });
  document.getElementById("tabSearch").style.display=showSearch?"block":"none";

  // 필터/stats
  document.getElementById("filtersEl").style.display=showSearch?"block":"none";
  document.getElementById("statsEl").style.display=showSearch?"flex":"none";
  const kwRow=document.querySelector(".kw-row");
  if(kwRow) kwRow.style.display=(showSearch&&sq.trim().split(/\s+/).filter(Boolean).length>1)?"flex":"none";

  // bottom nav
  document.querySelectorAll(".bnav-item").forEach((b,i)=>{
    const tabs=["search","alarm","parts","fav"];
    b.classList.toggle("on",tabs[i]===tab);
  });

  if(tab==="alarm") renderAlarms();
  if(tab==="parts") renderParts();
  if(tab==="fav")   renderFavs();
}

// ─── 알람코드 탭 ───
function renderAlarms(){
  const alarmCases=D.filter(c=>c.alarm).sort((a,b)=>a.alarm.localeCompare(b.alarm));
  const groups={T:[],B:[],P:[],기타:[]};
  alarmCases.forEach(c=>{
    const k=c.alarm[0].toUpperCase();
    if(groups[k]) groups[k].push(c); else groups["기타"].push(c);
  });
  const noAlarm=D.filter(c=>!c.alarm).length;
  let html="";
  ["T","B","P","기타"].forEach(g=>{
    if(!groups[g].length)return;
    html+=`<div class="alarm-group">
      <div class="alarm-group-header">
        <span class="alarm-group-pill alarm-group-${g}">${g==="기타"?"기타":g+" 알람"}</span>
        <span style="font-size:12px;color:var(--apple-text2)">${groups[g].length}건</span>
      </div>
      <div class="alarm-list">
        ${groups[g].map(c=>`
          <div class="alarm-row" onclick="goSearch('${c.alarm}')">
            <div>
              <div class="alarm-code">${c.alarm}</div>
              <div class="alarm-title-sm">${c.title}</div>
            </div>
            <div style="display:flex;align-items:center;gap:6px">
              <span class="alarm-device-tag">${c.device}</span>
              <span class="alarm-arrow">›</span>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
  });
  html+=`<div style="font-size:12px;color:var(--apple-text2);padding:4px 4px 24px">알람코드 없는 케이스 ${noAlarm}건은 검색 탭에서 확인</div>`;
  document.getElementById("alarmContent").innerHTML=html;
}

// ─── 부품 탭 ───
function renderParts(){
  const map={};
  D.forEach(c=>(c.parts||[]).forEach(p=>{map[p]=(map[p]||0)+1;}));
  const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]||a[0].localeCompare(b[0]));
  const html=`
    <div style="font-size:12px;color:var(--apple-text2);margin-bottom:12px">탭하면 관련 케이스를 검색합니다</div>
    <div class="parts-list">
      ${sorted.map(([p,n],i)=>`
        <div class="part-item" onclick="goSearch('${p.replace(/'/g,"\\'")}')">
          <span style="font-size:16px;margin-right:10px;opacity:.5">🔩</span>
          <span class="part-name">${p}</span>
          <span class="part-cnt-badge">${n}건</span>
          <span class="part-arrow">›</span>
        </div>`).join('')}
    </div>`;
  document.getElementById("partsContent").innerHTML=html;
}

// ─── 즐겨찾기 탭 ───
function renderFavs(){
  const el=document.getElementById("favContent");
  if(!favs.size){
    el.innerHTML=`<div class="fav-empty">
      <div class="fav-empty-icon">⭐</div>
      <p>카드의 ☆ 버튼을 탭하면<br>여기에 저장됩니다</p>
    </div>`; return;
  }
  const cards=Array.from(favs).map(id=>{
    const c=D.find(x=>x.id===id); if(!c)return'';
    return cardHTML(c,"");
  }).join('');
  el.innerHTML=`<div class="cards" style="padding:0 0 20px">${cards}</div>`;
}

function toggleFav(id){
  favs.has(id)?favs.delete(id):favs.add(id);
  localStorage.setItem("prismaxFavs",JSON.stringify([...favs]));
  if(curTab==="search") render();
  else if(curTab==="fav") renderFavs();
}

function goSearch(keyword){
  switchTab("search");
  sq=keyword;
  document.getElementById("si").value=keyword;
  document.getElementById("sc").classList.add("show");
  openSet.clear(); renderKwTags(); render();
}

function tog(id){
  openSet.has(id)?openSet.delete(id):openSet.add(id);
  render();
  setTimeout(()=>{
    const e=document.getElementById("c"+id);
    if(e) e.scrollIntoView({behavior:'smooth',block:'nearest'});
  },60);
}

function clearS(){
  sq="";
  document.getElementById("si").value="";
  document.getElementById("sc").classList.remove("show");
  openSet.clear(); renderKwTags(); render();
}

function renderKwTags(){
  const row=document.getElementById("kwRow");
  const terms=sq.trim().split(/\s+/).filter(Boolean);
  if(terms.length<2){ row.classList.remove("show"); row.innerHTML=""; return; }
  row.classList.add("show");
  row.innerHTML=`<span style="font-size:12px;color:var(--apple-text2);align-self:center">AND:</span>`+
    terms.map(t=>`<span class="kw-tag">🔍 ${t}</span>`).join('');
}

document.getElementById("si").addEventListener("input",function(){
  sq=this.value;
  document.getElementById("sc").classList.toggle("show",sq.length>0);
  openSet.clear(); renderKwTags(); render();
});

document.getElementById("devChips").addEventListener("click",function(e){
  const c=e.target.closest(".seg");if(!c)return;
  ad=c.dataset.v;
  this.querySelectorAll(".seg").forEach(x=>x.classList.remove("on"));
  c.classList.add("on"); openSet.clear(); render();
});

document.getElementById("catChips").addEventListener("click",function(e){
  const c=e.target.closest(".seg");if(!c)return;
  ac=c.dataset.v;
  this.querySelectorAll(".seg").forEach(x=>x.classList.remove("on"));
  c.classList.add("on"); openSet.clear(); render();
});

// 초기화
document.getElementById("tabSearch").style.display="block";
document.getElementById("tabAlarm").classList.remove("on");
document.getElementById("tabParts").classList.remove("on");
document.getElementById("tabFav").classList.remove("on");
render();
</script>
</body>
</html>
