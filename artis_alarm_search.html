<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ARTIS Alarm Search · Vantive</title>
<style>
:root{--plum:#72256B;--plum-d:#5C1B56;--plum-light:rgba(114,37,107,0.09);
--cream:#FFFAEB;--pine:#105742;--pine-light:rgba(16,87,66,0.10);
--euca:#6CA07A;--euca-light:rgba(108,160,122,0.12);
--amber:#D4700A;--amber-light:rgba(212,112,10,0.10);
--danger:#C0392B;--danger-light:rgba(192,57,43,0.10);
--white:#FFFFFF;--text:#1C1C1E;--text2:#52525B;--text3:#A1A1AA;
--border:rgba(0,0,0,0.07);--border-p:rgba(114,37,107,0.14);
--shadow:0 2px 14px rgba(0,0,0,0.06);--r:14px;--r-xs:5px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,"Segoe UI","Helvetica Neue",Arial,sans-serif;
background:var(--cream);color:var(--text);font-size:14px;min-height:100vh;-webkit-font-smoothing:antialiased;}
.hdr{background:linear-gradient(150deg,var(--plum-d) 0%,var(--plum) 60%,#8B3080 100%);
padding:16px 18px 0;position:sticky;top:0;z-index:200;overflow:hidden;}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;position:relative;z-index:2;}
.wmark-wrap{display:flex;flex-direction:column;gap:4px;}
.wmark-img{height:26px;width:auto;max-width:100px;display:block;}
.tagline{font-size:9px;font-weight:700;color:rgba(255,250,235,0.55);letter-spacing:1.8px;text-transform:uppercase;}
.total-badge{background:rgba(255,250,235,0.18);border:1px solid rgba(255,250,235,0.25);
color:var(--cream);font-size:11px;font-weight:700;padding:5px 13px;border-radius:20px;flex-shrink:0;margin-top:2px;}
.s-wrap{position:relative;margin-bottom:10px;z-index:2;}
.s-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);pointer-events:none;}
.s-inp{width:100%;padding:12px 42px 12px 44px;background:rgba(255,250,235,0.13);
border:1.5px solid rgba(255,250,235,0.22);border-radius:12px;font-size:14px;color:var(--cream);
outline:none;font-family:inherit;transition:background .18s,border-color .18s;}
.s-inp:focus{background:rgba(255,250,235,0.22);border-color:rgba(255,250,235,0.45);}
.s-inp::placeholder{color:rgba(255,250,235,0.45);}
.s-clr{position:absolute;right:10px;top:50%;transform:translateY(-50%);
background:rgba(255,250,235,0.22);border:none;border-radius:50%;
width:22px;height:22px;font-size:12px;cursor:pointer;color:var(--cream);
font-weight:700;display:none;line-height:22px;text-align:center;}
.s-clr.show{display:block;}
.s-hint{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding-bottom:12px;
font-size:11px;color:rgba(255,250,235,0.58);position:relative;z-index:2;}
.h-arr{color:rgba(255,250,235,0.75);font-weight:800;letter-spacing:-1px;}
.h-ex{background:rgba(255,250,235,0.14);border:1px solid rgba(255,250,235,0.18);
color:rgba(255,250,235,0.9);border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600;}
.filt{background:var(--cream);padding:12px 18px;border-bottom:1px solid var(--border);}
.flbl{font-size:9.5px;font-weight:800;color:var(--pine);letter-spacing:1.4px;text-transform:uppercase;margin-bottom:7px;}
.seg-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.seg-row::-webkit-scrollbar{display:none;}
.seg{flex-shrink:0;padding:6px 13px;border-radius:20px;font-size:12px;font-weight:600;
cursor:pointer;user-select:none;white-space:nowrap;background:rgba(0,0,0,0.05);color:var(--text2);
border:1.5px solid transparent;transition:all .15s ease;font-family:inherit;display:inline-flex;align-items:center;}
.seg.on{background:var(--plum);color:var(--cream);border-color:var(--plum);}
.seg:active{transform:scale(0.95);}
.sdot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;flex-shrink:0;}
.frow{margin-bottom:10px;}.frow:last-child{margin-bottom:0;}
.sbar{padding:8px 18px 6px;font-size:12px;color:var(--text2);background:var(--cream);}
.sbar b{color:var(--plum);font-weight:700;}
.cards{padding:8px 14px 32px;display:flex;flex-direction:column;gap:9px;}
.card{background:var(--white);border-radius:var(--r);box-shadow:0 2px 14px rgba(0,0,0,0.06);
border:1px solid var(--border);overflow:hidden;}
.chead{display:flex;align-items:flex-start;gap:10px;padding:13px 13px 11px;cursor:pointer;}
.abadge{display:inline-flex;align-items:center;justify-content:center;min-width:42px;padding:3px 7px;
border-radius:var(--r-xs);font-size:11px;font-weight:800;white-space:nowrap;flex-shrink:0;margin-top:2px;font-family:monospace;}
.a-num{background:var(--plum-light);color:var(--plum);border:1px solid var(--border-p);}
.pbadge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;}
.p-high{background:var(--danger-light);color:var(--danger);}
.p-medium{background:rgba(212,112,10,0.10);color:var(--amber);}
.p-low{background:rgba(0,0,0,0.05);color:var(--text3);}
.p-info{background:var(--euca-light);color:var(--pine);}
.cbadge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;}
.c-operator{background:var(--plum-light);color:var(--plum);}
.c-malfunction{background:var(--danger-light);color:var(--danger);}
.c-information{background:var(--pine-light);color:var(--pine);}
.cbody{flex:1;min-width:0;}
.ctitle{font-size:13.5px;font-weight:700;line-height:1.45;margin-bottom:6px;color:var(--text);}
.cmeta{display:flex;flex-wrap:wrap;gap:4px;align-items:center;}
.chev{color:var(--text3);flex-shrink:0;margin-top:2px;width:22px;height:22px;
display:flex;align-items:center;justify-content:center;
background:rgba(0,0,0,0.04);border-radius:50%;transition:transform .25s ease,background .15s,color .15s;}
.chev.open{transform:rotate(180deg);background:var(--plum-light);color:var(--plum);}
.cdet{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1);}
.cdet.open{max-height:2000px;border-top:1px solid var(--border);}
.cdet-in{padding:15px 13px 18px;background:rgba(255,250,235,0.5);}
.dsec{margin-bottom:13px;}.dsec:last-child{margin-bottom:0;}
.dlbl{display:flex;align-items:center;gap:6px;font-size:9.5px;font-weight:800;color:var(--pine);
text-transform:uppercase;letter-spacing:1.2px;margin-bottom:7px;}
.darr{color:var(--plum);font-weight:900;font-size:10px;letter-spacing:-1px;}
.dbox,.abox,.sbox,.mbox{font-size:13.5px;line-height:1.75;border-radius:10px;padding:11px 13px;}
.dbox{color:var(--text);background:var(--white);border:1px solid var(--border);}
.abox{color:#7a4800;background:var(--amber-light);border:1px solid rgba(212,112,10,0.2);}
.sbox{color:var(--pine);font-weight:500;background:var(--euca-light);border:1px solid rgba(108,160,122,0.25);}
.mbox{color:#7B241C;background:var(--danger-light);border:1px solid rgba(192,57,43,0.2);}
.dbox ul,.abox ul,.sbox ul{list-style:none;padding:0;}
.dbox li,.abox li,.sbox li{padding:2px 0 2px 14px;position:relative;}
.dbox li::before,.abox li::before,.sbox li::before{content:"·";position:absolute;left:4px;color:var(--text3);}
mark{background:rgba(114,37,107,0.13);color:var(--plum);border-radius:2px;padding:0 1px;}
.empty{text-align:center;padding:60px 24px;color:var(--text2);display:none;}
.empty-ico{font-size:46px;margin-bottom:12px;opacity:.4;}
.empty h3{font-size:17px;font-weight:700;margin-bottom:6px;}
.empty p{font-size:13px;}
</style>
</head>

var ALARMS=[{"code": "1", "name": "Acid/Acetate Concentrate Container Empty", "priority": "medium", "category": "operator", "causes": ["The Acid concentrate canister/bag is either empty or not properly connected; as a result the Acid Pump cannot reach the set conductivity value.", "The Acid concentrate canister/bag is empty.", "Massive air leak from the Acid concentrate canister/bag.", "The Acid pick-up tube connector is not connected to the concentrate canister/bag."], "operator_actions": ["Press the “Special Procedures” button. Select the “Change Acid” option to change the Acid concentrate canister/bag. Perform the “Change Acid” special procedure as described in the “Change Acid” section of the Operator’s Manual.", "Check the Acid concentrate canister/bag. Press the “Special Procedures” button. Select the “Change Acid” option to change the Acid concentrate canister/bag. Perform the “Change Acid” special procedure as described in the “Change Acid” section of the Operator’s Manual.", "Check that the Acid pick-up tube connector is properly connected to the concentrate canister/bag. Press the “Special Procedures” button. Select the “Change Acid” option to change the Acid concentrate canister/bag. Perform the “Change Acid” special procedure as described in the “Change Acid” section of the Operator’s Manual."], "service_actions": ["Defective connection between the ΓcA conductivity cell, Hydraulic I2C Board, Motherboard and Hydraulic slave board. → Verify the connections, clean, repair or replace as required.", "The acetate tube is kinked or has a leak. → Repair or replace as required.", "The PA pump is blocked or defective. → Verify the “PA Freq” encoder parameter value displayed in the “Prot” column of the Page 1 in the Service Data screen. Repair or replace as required.", "The ΓcA conductivity cell is not properly calibrated or is defective. → Verify the “Cond A” in relation with the “Cond P” parameter values, displayed in the Page 1 of the Service Data screen. Replace as required.", "The Hydraulic I2C board is defective. → Replace as required.", "The Hydraulic slave board is defective. → Replace as required."], "system_response": "The dialysis fluid goes into Bypass;; The concentrate pumps are stopped;; The Infusion flow is interrupted;; The Ultra clamp is closed."}, {"code": "2", "name": "Incorrect Red Concentrate Connector Position", "priority": "low", "category": "operator", "causes": ["The Red Concentrate Connector is in the wrong position or is not fully inserted into its Concentrate Connector Port.", "The Red Concentrate Connector is in the wrong position.", "The Red Concentrate Connector is not fully inserted into its Concentrate Connector Port."], "operator_actions": ["In Dialysis (BiCart treatments): Verify that the Red Concentrate Connector is connected to the Acid concentrate canister/bag.", "In ADR, Select and AFB K Treatment: Verify that the Red Concentrate Connector is securely connected to its Concentrate Connector Port."], "service_actions": ["Defective connection between the SWA switch, Motherboard and Hydraulic slave board. → Verify the “SWA” parameter value displayed Service Data in the Page 1 of the screen. With the opening and closing of the Red Concentrate Connector, the state of the “SWA” value (Open/Closed) must change. Clean, repair or replace as required.", "The SWA microswitch is defective. → Replace as required.", "The Hydraulic slave board is defective. Service Manual: «MAINTENANCE» → Replace as required."], "system_response": "The phase currently running; The concentrate pumps are stopped;; The dialysis fluid goes into Bypass;; The infusion flow is interrupted;; The Ultra clamp is closed. In ADR:; The phase currently running stops;; All the pumps are stopped."}, {"code": "3", "name": "Incorrect SelectCart Holder Arms Position", "priority": "low", "category": "operator", "causes": ["The Select Cart Holder Arms are in the wrong position or not closed securely.", "The Select Cart Holder Arms are in the wrong position, or not closed securely."], "operator_actions": ["Verify the correct position of the Select Cart Holder Arms in relation to the machine phase."], "service_actions": ["Defective connection between the SWAK switches, Motherboard and Hydraulic slave board. → Verify the “SWAK” parameter value displayed in the Page 1 of the Service Data screen. With the opening and closing of the Select Cart Holder Arms, the state of the “SWAK” value (Open/Closed) must change. Clean repair or replace as required.", "The SWAK switch Hall sensor is defective. → Verify the “SWAK” parameter value displayed in the Page 1 of the Service Data screen. With the opening and closing of the Select Cart Holder Arms, the state of the “SWAK” value (Open/Closed) must change. Clean repair or replace as required.", "The Hydraulic slave board is defective. → Replace as required."], "system_response": "The phase currently running stops;; All the concentrate pumps are stopped;; The dialysis fluid goes into Bypass;; The Infusion flow is interrupted;; The Ultra clamp is closed."}, {"code": "4", "name": "Air in Venous Line", "priority": "high", "category": "operator", "causes": ["Air has been detected in the Venous Patient Line.", "Air in the Venous Patient Line. ."], "operator_actions": ["Manually clamp the Venous Patient Line under the Venous line clamp and below any visible air.", "Manually clamp the venous dialyzer line;", "Attach a sterile luer-lock syringe to the venous infusion line;", "Open the clamp on the venous infusion line and gradually create a negative venous pressure (around -80 mmHg);", "When the machine opens the Venous Line Clamp and the pressure reaches the right negative pressure, close the clamp on the venous infusion line;", "Remove the manual clamp from the Venous Patient Line: air will be drawn into the venous chamber;", "If air is still present in the venous line, repeat the procedure;", "Start the Arterial pump by pressing the “Blood Pump On/Off” key on the hard key panel and immediately remove the manual clamp from the venous dialyzer line;", "If needed, adjust the chamber levels (See NOTE 1) Manual for better explanations on the"], "service_actions": ["Defective connection between the Air Detector, PIB board, Motherboard and Protective slave board. → Verify the connections, clean, repair or replace as required.", "The Air Detector is defective. → Replace as required.", "The PIB board is defective. → Replace as required.", "The Protective slave board is defective. → Replace as required."], "system_response": "The Arterial and the Venous Pumps; The Venous Line Clamp is closed;; The UF Rate is automatically set to zero;; The dialysis fluid goes into Bypass;; The Infusion flow is interrupted;; The Ultra clamp is closed. To remove air from the Venous Patient Line, a negative chamber. Before troubleshooting the alarm, carefully; The proper range (from -90 mmHg to -80 mmHg) will open the venous line clamp and facilitate the removal of air from the venous; Position the manual clamps as described below in order to trap the air in the section of the circuit between the two clamps;; First remove the manual clamp on the Venous Patient line in order to maximize air removal from the patient line; During the negative venous pressure creation, increase above + 40 mmHg in order to prevent venous line respectively. If these pressures are reached the procedure must be repeated. In case pressure alarms and “Air in Venous Line” alarms must be resolved first. This is to ensure that the blood pump starts when completed."}, {"code": "6", "name": "MALFUNCTION", "priority": "high", "category": "malfunction", "causes": ["The Control System has detected a large spike or a large rapid change while monitoring the Arterial Pressure Sensor.", "A malfunction occurred on the Arterial Pressure Sensor."], "operator_actions": ["Perform a Fast Recovery procedure as described in the “Fast Recovery” section of the Operator’s Manual."], "service_actions": ["Defective var CF='all',PF='all',SQ='',OS={};
var CK={operator:'Operator',malfunction:'Malfunction',information:'Information'};
var PK={high:'High',medium:'Medium',low:'Low',info:'Info'};

function eh(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function hl(t,ws){
  var s=eh(t);if(!ws||!ws.length)return s;
  for(var i=0;i<ws.length;i++){var w=ws[i];if(!w)continue;
    var re=new RegExp('('+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    s=s.replace(re,'<mark>$1</mark>');}
  return s;
}
function mkList(arr,ws,cls){
  if(!arr||!arr.length)return '';
  if(arr.length===1)return '<div class="'+cls+'">'+hl(arr[0],ws)+'</div>';
  var li='';for(var i=0;i<arr.length;i++)li+='<li>'+hl(arr[i],ws)+'</li>';
  return '<div class="'+cls+'"><ul>'+li+'</ul></div>';
}
function mkDetail(a,ws){
  var h='';
  if(a.causes&&a.causes.length){h+='<div class="dsec"><div class="dlbl"><span class="darr">&gt;&gt;</span>Cause</div>'+mkList(a.causes,ws,'dbox')+'</div>';}
  if(a.operator_actions&&a.operator_actions.length){h+='<div class="dsec"><div class="dlbl"><span class="darr">&gt;&gt;</span>Operator Actions</div>'+mkList(a.operator_actions,ws,'abox')+'</div>';}
  if(a.service_actions&&a.service_actions.length){h+='<div class="dsec"><div class="dlbl"><span class="darr">&gt;&gt;</span>Service Actions</div>'+mkList(a.service_actions,ws,'sbox')+'</div>';}
  if(a.system_response){h+='<div class="dsec"><div class="dlbl"><span class="darr">&gt;&gt;</span>Machine Actions</div><div class="mbox">'+hl(a.system_response,ws)+'</div></div>';}
  return h;
}
function render(list){
  var ws=SQ?SQ.trim().toLowerCase().split(/\s+/):[];
  var el=document.getElementById('cardsEl');
  var em=document.getElementById('emptyEl');
  document.getElementById('mCnt').textContent=list.length;
  document.getElementById('totalBadge').textContent=list.length;
  if(!list.length){el.innerHTML='';em.style.display='block';return;}
  em.style.display='none';
  var html='';
  for(var i=0;i<list.length;i++){
    var a=list[i];
    var isOpen=!!OS[a.code+'_'+i];
    var oc='onclick="tog('+i+',&#39;'+eh(a.code)+'&#39;)"';
    html+='<div class="card" id="c'+i+'">';
    html+='<div class="chead" '+oc+'>';
    html+='<span class="abadge a-num">'+hl(a.code,ws)+'</span>';
    html+='<div class="cbody">';
    html+='<div class="ctitle">'+hl(a.name,ws)+'</div>';
    html+='<div class="cmeta">';
    html+='<span class="cbadge c-'+a.category+'">'+(CK[a.category]||eh(a.category))+'</span> ';
    if(a.priority&&a.priority!=='info'){html+='<span class="pbadge p-'+a.priority+'">'+(PK[a.priority]||eh(a.priority))+'</span>';}
    else if(a.priority==='info'){html+='<span class="pbadge p-info">Info</span>';}
    html+='</div></div>';
    html+='<div class="chev'+(isOpen?' open':'')+'"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg></div>';
    html+='</div>';
    html+='<div class="cdet'+(isOpen?' open':'')+'" id="d'+i+'">';
    html+='<div class="cdet-in">'+mkDetail(a,ws)+'</div>';
    html+='</div></div>';
  }
  el.innerHTML=html;
}
function tog(i,code){
  var key=code+'_'+i;
  var d=document.getElementById('d'+i);
  var c=document.getElementById('c'+i);
  if(!d||!c)return;
  var cv=c.querySelector('.chev');
  if(OS[key]){delete OS[key];d.classList.remove('open');if(cv)cv.classList.remove('open');}
  else{OS[key]=1;d.classList.add('open');if(cv)cv.classList.add('open');}
}
function go(){
  var ws=SQ?SQ.trim().toLowerCase().split(/\s+/):[];
  var list=ALARMS.slice();
  if(CF!=='all')list=list.filter(function(a){return a.category===CF;});
  if(PF!=='all')list=list.filter(function(a){return a.priority===PF;});
  if(ws.length)list=list.filter(function(a){
    var h=[a.code||'',a.name||'',
      (a.causes||[]).join(' '),(a.operator_actions||[]).join(' '),
      (a.service_actions||[]).join(' '),a.system_response||''
    ].join(' ').toLowerCase();
    return ws.every(function(w){return h.indexOf(w)>=0;});
  });
  OS={};render(list);
}
var sInp=document.getElementById('sInp');
var sClr=document.getElementById('sClr');
sInp.addEventListener('input',function(){SQ=sInp.value;sClr.className=SQ.length?'s-clr show':'s-clr';go();});
sClr.addEventListener('click',function(){sInp.value='';SQ='';sClr.className='s-clr';go();});
document.getElementById('catRow').addEventListener('click',function(e){
  var b=e.target;while(b&&!b.classList.contains('seg'))b=b.parentElement;
  if(!b)return;
  document.querySelectorAll('#catRow .seg').forEach(function(x){x.classList.remove('on');});
  b.classList.add('on');CF=b.getAttribute('data-v');go();
});
document.getElementById('prioRow').addEventListener('click',function(e){
  var b=e.target;while(b&&!b.classList.contains('seg'))b=b.parentElement;
  if(!b)return;
  document.querySelectorAll('#prioRow .seg').forEach(function(x){x.classList.remove('on');});
  b.classList.add('on');PF=b.getAttribute('data-v');go();
});
go();

</script>
