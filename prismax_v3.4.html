<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CRRT 장비 점검 이력 검색 · Vantive</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --plum:        #72256B;
  --plum-d:      #5C1B56;
  --plum-light:  rgba(114,37,107,0.09);
  --plum-mid:    rgba(114,37,107,0.20);
  --cream:       #FFFAEB;
  --cream-mid:   #F5EDD8;
  --pine:        #105742;
  --pine-light:  rgba(16,87,66,0.10);
  --euca:        #6CA07A;
  --euca-light:  rgba(108,160,122,0.12);
  --sage:        #CDDFD7;
  --sage-bg:     #E8F3F0;
  --white:       #FFFFFF;
  --text:        #1C1C1E;
  --text2:       #52525B;
  --text3:       #A1A1AA;
  --border:      rgba(0,0,0,0.07);
  --border-p:    rgba(114,37,107,0.14);
  --shadow:      0 2px 14px rgba(0,0,0,0.06);
  --shadow-md:   0 6px 24px rgba(0,0,0,0.10);
  --r:    14px;
  --r-sm:  9px;
  --r-xs:  5px;
  --nav-h: 64px;
}

* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'Noto Sans KR', -apple-system, 'Apple SD Gothic Neo', sans-serif;
  background: var(--cream);
  color: var(--text);
  font-size: 14px;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(150deg, var(--plum-d) 0%, var(--plum) 60%, #8B3080 100%);
  padding: 16px 18px 0;
  position: sticky; top: 0; z-index: 200;
  overflow: hidden;
}

/* V Watermark (decorative) */
.header-wm {
  position: absolute; top: -10px; right: -20px;
  pointer-events: none; opacity: 1;
}

.header-top {
  display: flex; align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 14px;
  position: relative; z-index: 2;
}

/* ── VANTIVE LOGO ── */
/* ── VANTIVE WORDMARK: actual logo image, cream-on-plum via blend ── */
.vantive-logo { display: flex; align-items: center; gap: 0; }

.wordmark-wrap {
  display: flex; flex-direction: column; gap: 4px;
}

/*
  The logo PNG is plum-on-cream.
  filter: invert(1) → cream-on-dark-purple (colors flipped)
  mix-blend-mode: screen → dark areas become transparent, light (cream logo) shines through
  Result: cream Vantive wordmark appears on the plum gradient header
*/
.wordmark-img {
  height: 30px;
  width: auto;
  display: block;
  /* transparent PNG: cream logo shows naturally on plum header */
}

.app-tagline {
  font-size: 9px; font-weight: 700;
  color: rgba(255,250,235,0.55);
  letter-spacing: 1.8px; text-transform: uppercase;
}

.total-badge {
  background: rgba(255,250,235,0.18);
  border: 1px solid rgba(255,250,235,0.25);
  color: var(--cream); font-size: 11px; font-weight: 700;
  padding: 5px 13px; border-radius: 20px;
  flex-shrink: 0; margin-top: 2px;
}

/* ── SEARCH ── */
.search-wrap { position: relative; margin-bottom: 10px; z-index: 2; }

.search-icon-wrap {
  position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
  pointer-events: none;
}

.search-input {
  width: 100%;
  padding: 12px 42px 12px 44px;
  background: rgba(255,250,235,0.13);
  border: 1.5px solid rgba(255,250,235,0.22);
  border-radius: 12px;
  font-size: 14px; font-weight: 400;
  color: var(--cream);
  outline: none; font-family: inherit;
  transition: background .18s, border-color .18s;
}
.search-input:focus {
  background: rgba(255,250,235,0.22);
  border-color: rgba(255,250,235,0.45);
}
.search-input::placeholder { color: rgba(255,250,235,0.45); }

.search-clear {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  background: rgba(255,250,235,0.22); border: none; border-radius: 50%;
  width: 22px; height: 22px; font-size: 12px; line-height: 22px;
  text-align: center; cursor: pointer; display: none; color: var(--cream); font-weight: 700;
}
.search-clear.show { display: block; }

/* AND hint */
.search-hint {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  padding-bottom: 12px;
  font-size: 11px; color: rgba(255,250,235,0.58);
  position: relative; z-index: 2;
}
.v-arrows { color: rgba(255,250,235,0.75); font-weight: 800; font-size: 11px; letter-spacing: -1px; }
.hint-ex {
  background: rgba(255,250,235,0.14); border: 1px solid rgba(255,250,235,0.18);
  color: rgba(255,250,235,0.9);
  border-radius: 4px; padding: 2px 8px;
  font-size: 11px; font-weight: 600;
}

/* ── KW TAGS ── */
.kw-row {
  display: none; flex-wrap: wrap; gap: 5px; align-items: center;
  padding: 8px 18px 10px;
  background: rgba(255,250,235,0.6);
  border-bottom: 1px solid var(--border-p);
}
.kw-row.show { display: flex; }
.kw-label { font-size: 11px; color: var(--text2); font-weight: 500; }
.kw-tag {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--plum-light); color: var(--plum);
  border-radius: 20px; padding: 3px 11px;
  font-size: 12px; font-weight: 700;
}

/* ── FILTERS ── */
.filters { background: var(--cream); padding: 12px 18px; border-bottom: 1px solid var(--border); }

.flabel {
  font-size: 9.5px; font-weight: 800;
  color: var(--pine); letter-spacing: 1.4px; text-transform: uppercase;
  margin-bottom: 7px;
}

.seg-wrap {
  display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px;
}
.seg-wrap::-webkit-scrollbar { display: none; }

.seg {
  flex-shrink: 0; padding: 6px 13px; border-radius: 20px;
  font-size: 12px; font-weight: 600; cursor: pointer; user-select: none; white-space: nowrap;
  background: rgba(0,0,0,0.05); color: var(--text2);
  border: 1.5px solid transparent;
  transition: all .15s ease; font-family: inherit;
}
.seg.on { background: var(--plum); color: var(--cream); border-color: var(--plum); }

.seg-dot {
  display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; margin-right: 4px; vertical-align: middle;
}

.filter-row { margin-bottom: 10px; }
.filter-row:last-child { margin-bottom: 0; }

/* ── STATS ── */
.stats-bar {
  padding: 8px 18px 6px;
  font-size: 12px; color: var(--text2); background: var(--cream);
}
.stats-bar b { color: var(--plum); font-weight: 700; }

/* ── CARDS ── */
.cards {
  padding: 8px 14px calc(var(--nav-h) + env(safe-area-inset-bottom,16px) + 20px);
  display: flex; flex-direction: column; gap: 9px;
}

.card {
  background: var(--white); border-radius: var(--r);
  box-shadow: var(--shadow); border: 1px solid var(--border);
  overflow: hidden; transition: box-shadow .2s;
}
.card:active { box-shadow: var(--shadow-md); }

.card-head {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 13px 13px 11px; cursor: pointer;
}

/* Alarm badges — Vantive color palette */
.abadge {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 52px; padding: 3px 7px; border-radius: var(--r-xs);
  font-size: 10px; font-weight: 800; letter-spacing: 0.3px;
  white-space: nowrap; flex-shrink: 0; margin-top: 2px; text-transform: uppercase;
}
.aT { background: var(--euca-light); color: var(--pine);  border: 1px solid rgba(108,160,122,0.28); }
.aB { background: var(--plum-light); color: var(--plum);  border: 1px solid var(--border-p); }
.aP { background: var(--pine-light); color: var(--pine);  border: 1px solid rgba(16,87,66,0.2); }
.aS { background: var(--sage-bg);    color: var(--pine);  border: 1px solid rgba(205,223,215,0.5); }
.aX { background: rgba(0,0,0,0.04); color: var(--text3); border: 1px solid var(--border); }

.card-body { flex: 1; min-width: 0; }

.card-title { font-size: 13.5px; font-weight: 700; line-height: 1.45; margin-bottom: 6px; color: var(--text); }

.card-meta { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }

.mtag {
  display: inline-block; padding: 2px 7px; border-radius: 4px;
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px;
}
.mdev  { background: var(--plum-light); color: var(--plum); }
.mcat  { background: var(--sage-bg);    color: var(--pine); }
.mdate { font-size: 10px; color: var(--text3); font-weight: 400; }

.chev {
  color: var(--text3); font-size: 13px; flex-shrink: 0; margin-top: 2px;
  width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.04); border-radius: 50%;
  transition: transform .25s ease, background .15s, color .15s;
}
.chev.open { transform: rotate(180deg); background: var(--plum-light); color: var(--plum); }

.star-btn {
  background: none; border: none; cursor: pointer;
  font-size: 18px; padding: 1px; flex-shrink: 0;
  line-height: 1; opacity: .28;
  transition: opacity .15s, transform .2s;
}
.star-btn.on { opacity: 1; }
.star-btn:active { transform: scale(1.4); }

/* ── CARD DETAIL ── */
.card-detail {
  max-height: 0; overflow: hidden;
  transition: max-height .32s cubic-bezier(.4,0,.2,1);
  border-top: 0px solid var(--border);
}
.card-detail.open { max-height: 720px; border-top: 1px solid var(--border); }

.card-detail-inner { padding: 15px 13px 18px; background: rgba(255,250,235,0.5); }

.dsec { margin-bottom: 13px; }
.dsec:last-child { margin-bottom: 0; }

.dlabel {
  display: flex; align-items: center; gap: 6px;
  font-size: 9.5px; font-weight: 800;
  color: var(--pine);
  text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 7px;
}
.dlabel-arr { color: var(--plum); font-weight: 900; font-size: 10px; letter-spacing: -1px; }

.dbox {
  font-size: 13.5px; line-height: 1.7; color: var(--text);
  background: var(--white); border-radius: 10px;
  padding: 11px 13px; border: 1px solid var(--border);
}
.sbox {
  font-size: 13.5px; line-height: 1.7;
  color: var(--pine); font-weight: 500;
  background: var(--euca-light); border-radius: 10px;
  padding: 11px 13px; border: 1px solid rgba(108,160,122,0.25);
}

.ptags { display: flex; flex-wrap: wrap; gap: 5px; }
.ptag {
  padding: 3px 10px; border-radius: 5px;
  background: var(--plum-light); color: var(--plum);
  font-size: 11px; font-weight: 600;
}

mark { background: rgba(114,37,107,0.13); color: var(--plum); border-radius: 2px; padding: 0 1px; }

/* ── EMPTY ── */
.empty { text-align: center; padding: 60px 24px; color: var(--text2); display: none; }
.empty-icon { font-size: 46px; margin-bottom: 12px; opacity: .4; }
.empty h3 { font-size: 17px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
.empty p { font-size: 13px; }

/* ── SUBVIEW ── */
.subview { display: none; padding: 16px 14px calc(var(--nav-h) + env(safe-area-inset-bottom,16px) + 24px); }
.subview.on { display: block; }

.sv-title-bar {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 16px; padding-bottom: 10px;
  border-bottom: 2px solid var(--plum);
}
.sv-arr { color: var(--plum); font-weight: 900; font-size: 12px; letter-spacing: -1px; }
.sv-title-text {
  font-size: 10px; font-weight: 800;
  color: var(--pine); letter-spacing: 1.5px; text-transform: uppercase;
}

/* Alarm Tab */
.alarm-group { margin-bottom: 22px; }
.alarm-group-header { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
.alarm-group-pill {
  font-size: 11px; font-weight: 800; letter-spacing: 0.8px; text-transform: uppercase;
  padding: 3px 11px; border-radius: 20px;
}
.ag-T { background: var(--euca-light); color: var(--pine); }
.ag-B { background: var(--plum-light); color: var(--plum); }
.ag-P { background: var(--pine-light); color: var(--pine); }
.ag-X { background: rgba(0,0,0,0.05); color: var(--text2); }
.ag-cnt { font-size: 11px; color: var(--text3); }

.alarm-list {
  background: var(--white); border-radius: var(--r);
  overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--border);
}
.alarm-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 15px; cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background .12s;
}
.alarm-row:last-child { border-bottom: none; }
.alarm-row:active { background: var(--plum-light); }

.alarm-code { font-size: 14px; font-weight: 800; color: var(--plum); }
.alarm-title-sm { font-size: 11px; color: var(--text2); margin-top: 2px; }
.alarm-dev-tag {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px;
  color: var(--pine); background: var(--sage-bg);
  padding: 2px 8px; border-radius: 4px; flex-shrink: 0;
}
.alarm-arr { color: var(--plum); font-size: 15px; font-weight: 700; margin-left: 6px; }

/* Parts Tab */
.parts-info { font-size: 11px; color: var(--text3); margin-bottom: 10px; }
.parts-list {
  background: var(--white); border-radius: var(--r);
  overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--border);
}
.part-item {
  display: flex; align-items: center;
  padding: 12px 15px; cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background .12s;
}
.part-item:last-child { border-bottom: none; }
.part-item:active { background: var(--plum-light); }
.part-icon-wrap { width: 32px; height: 32px; margin-right: 10px; flex-shrink: 0; color: var(--plum); }
.part-name { flex: 1; font-size: 13.5px; color: var(--text); font-weight: 500; }
.part-cnt {
  background: var(--plum-light); color: var(--plum);
  border-radius: 8px; font-size: 11px; font-weight: 700;
  padding: 2px 9px; margin-right: 8px;
}
.part-arr { color: var(--plum); font-size: 14px; font-weight: 700; }

/* Fav empty */
.fav-empty { text-align: center; padding: 60px 24px; color: var(--text2); }
.fav-empty-icon { font-size: 44px; margin-bottom: 12px; opacity: .32; }
.fav-empty p { font-size: 13px; line-height: 1.65; }

/* ── BOTTOM NAV ── */
.bnav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--nav-h) + env(safe-area-inset-bottom,0px));
  background: #B5CFBC; /* Eucalyptus #6CA07A + 50% white */
  border-top: 1.5px solid rgba(114,37,107,0.18);
  display: flex; align-items: flex-start; padding-top: 8px; z-index: 200;
}
.bnav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 3px 4px; cursor: pointer; border: none; background: none;
  font-family: inherit; -webkit-tap-highlight-color: transparent;
}
.bnav-svg {
  width: 24px; height: 24px; color: rgba(114,37,107,0.4);
  transition: color .15s, transform .18s cubic-bezier(.34,1.56,.64,1);
}
.bnav-label { font-size: 10px; font-weight: 600; color: rgba(114,37,107,0.5); font-family: inherit; }

.bnav-item.on .bnav-svg   { color: var(--plum); transform: scale(1.12); }
.bnav-item.on .bnav-label { color: var(--plum); font-weight: 800; }
.bnav-item:active .bnav-svg { transform: scale(0.88); }

#tabSearch { display: none; }
</style>
</head>

// ─── STATE ───
let sq="", ad="all", ac="all", openSet=new Set();
let curTab="search";
let favs=new Set(JSON.parse(localStorage.getItem("prismaxFavs")||"[]"));

function acls(a){
  if(!a) return "aX";
  const c=a[0].toUpperCase();
  return c==="T"?"aT":c==="B"?"aB":c==="P"?"aP":c==="S"?"aS":"aX";
}

function hl(t,q){
  if(!q) return t;
  const terms=q.trim().split(/\s+/).filter(Boolean);
  if(!terms.length) return t;
  const re=new RegExp('('+terms.map(t=>t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|')+')','gi');
  return t.replace(re,m=>`<mark>${m}</mark>`);
}

function match(c,q){
  if(!q) return true;
  const h=[c.alarm,c.title,c.symptom,c.solution,c.device,c.cat,...(c.parts||[]),...(c.tags||[])].join(" ").toLowerCase();
  const terms=q.toLowerCase().split(/\s+/).filter(Boolean);
  return terms.every(t=>h.includes(t));
}

// SVG icons for parts list (Vantive style — outline, plum stroke)
const partSVG=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>`;

function cardHTML(c,q){
  const o=openSet.has(c.id);
  const starred=favs.has(c.id);
  return `<div class="card" id="c${c.id}">
    <div class="card-head" onclick="tog(${c.id})">
      <span class="abadge ${acls(c.alarm)}">${c.alarm||"—"}</span>
      <div class="card-body">
        <div class="card-title">${hl(c.title,q)}</div>
        <div class="card-meta">
          <span class="mtag mdev">${c.device}</span>
          <span class="mtag mcat">${c.cat}</span>
          <span class="mdate">${c.date}</span>
        </div>
      </div>
      <button class="star-btn ${starred?'on':''}" onclick="event.stopPropagation();toggleFav(${c.id})">${starred?'⭐':'☆'}</button>
      <span class="chev ${o?'open':''}">▾</span>
    </div>
    <div class="card-detail ${o?'open':''}">
      <div class="card-detail-inner">
        <div class="dsec">
          <div class="dlabel"><span class="dlabel-arr">>>></span> 증상 / 문제</div>
          <div class="dbox">${hl(c.symptom.replace(/\n/g,'<br>'),q)}</div>
        </div>
        <div class="dsec">
          <div class="dlabel"><span class="dlabel-arr">>>></span> 해결 방법</div>
          <div class="sbox">${hl(c.solution.replace(/\n/g,'<br>'),q)}</div>
        </div>
        ${c.parts.length?`<div class="dsec">
          <div class="dlabel"><span class="dlabel-arr">>>></span> 관련 부품</div>
          <div class="ptags">${c.parts.map(p=>`<span class="ptag">${hl(p,q)}</span>`).join('')}</div>
        </div>`:''}
      </div>
    </div>
  </div>`;
}

function render(){
  const q=sq.trim();
  const f=D.filter(c=>{
    if(ad!=="all"&&c.device!==ad) return false;
    if(ac!=="all"&&c.cat!==ac)    return false;
    return match(c,q);
  }).sort((a,b)=>b.date.localeCompare(a.date));

  document.getElementById("cnt").textContent=f.length;
  document.getElementById("totalBadge").textContent=D.length+"건";
  const el=document.getElementById("list");
  const em=document.getElementById("empty");
  if(!f.length){ el.innerHTML=""; em.style.display="block"; return; }
  em.style.display="none";
  el.innerHTML=f.map(c=>cardHTML(c,q)).join('');
}

function switchTab(tab){
  curTab=tab;
  const showSearch=(tab==="search");

  ["alarm","parts","fav"].forEach(t=>{
    const el=document.getElementById("tab"+t.charAt(0).toUpperCase()+t.slice(1));
    if(el) el.classList.toggle("on",t===tab);
  });
  document.getElementById("tabSearch").style.display=showSearch?"block":"none";
  document.getElementById("filtersEl").style.display=showSearch?"block":"none";
  document.getElementById("statsEl").style.display=showSearch?"block":"none";
  const kw=document.getElementById("kwRow");
  if(kw) kw.style.display=(showSearch&&sq.trim().split(/\s+/).filter(Boolean).length>1)?"flex":"none";

  document.querySelectorAll(".bnav-item").forEach((b,i)=>{
    b.classList.toggle("on",["search","alarm","parts","fav"][i]===tab);
  });

  if(tab==="alarm") renderAlarms();
  if(tab==="parts") renderParts();
  if(tab==="fav")   renderFavs();
}

function renderAlarms(){
  const alarmCases=D.filter(c=>c.alarm).sort((a,b)=>a.alarm.localeCompare(b.alarm));
  const groups={T:[],B:[],P:[],X:[]};
  alarmCases.forEach(c=>{
    const k=c.alarm[0].toUpperCase();
    if(groups[k]) groups[k].push(c); else groups.X.push(c);
  });
  const noAlarm=D.filter(c=>!c.alarm).length;
  let html="";
  [["T","T 알람","ag-T"],["B","B 알람","ag-B"],["P","P 알람","ag-P"],["X","기타","ag-X"]].forEach(([g,label,cls])=>{
    if(!groups[g].length) return;
    html+=`<div class="alarm-group">
      <div class="alarm-group-header">
        <span class="alarm-group-pill ${cls}">${label}</span>
        <span class="ag-cnt">${groups[g].length}건</span>
      </div>
      <div class="alarm-list">
        ${groups[g].map(c=>`
          <div class="alarm-row" onclick="goSearch('${c.alarm}')">
            <div>
              <div class="alarm-code">${c.alarm}</div>
              <div class="alarm-title-sm">${c.title}</div>
            </div>
            <div style="display:flex;align-items:center">
              <span class="alarm-dev-tag">${c.device}</span>
              <span class="alarm-arr">›</span>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
  });
  html+=`<p style="font-size:11px;color:var(--text3);padding:4px 2px 20px">알람코드 없는 케이스 ${noAlarm}건은 검색 탭에서 확인</p>`;
  document.getElementById("alarmContent").innerHTML=html;
}

function renderParts(){
  const map={};
  D.forEach(c=>(c.parts||[]).forEach(p=>{map[p]=(map[p]||0)+1;}));
  const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]||a[0].localeCompare(b[0]));
  const html=`
    <p class="parts-info">탭하면 관련 케이스를 검색합니다</p>
    <div class="parts-list">
      ${sorted.map(([p,n])=>`
        <div class="part-item" onclick="goSearch('${p.replace(/'/g,"\\'")}')">
          <div class="part-icon-wrap">${partSVG}</div>
          <span class="part-name">${p}</span>
          <span class="part-cnt">${n}건</span>
          <span class="part-arr">›</span>
        </div>`).join('')}
    </div>`;
  document.getElementById("partsContent").innerHTML=html;
}

function renderFavs(){
  const el=document.getElementById("favContent");
  if(!favs.size){
    el.innerHTML=`<div class="fav-empty">
      <div class="fav-empty-icon">⭐</div>
      <p>카드의 ☆ 버튼을 탭하면<br>여기에 저장됩니다</p>
    </div>`; return;
  }
  const cards=Array.from(favs).map(id=>{
    const c=D.find(x=>x.id===id); if(!c) return'';
    return cardHTML(c,"");
  }).join('');
  el.innerHTML=`<div class="cards" style="padding:0 0 20px">${cards}</div>`;
}

function toggleFav(id){
  favs.has(id)?favs.delete(id):favs.add(id);
  localStorage.setItem("prismaxFavs",JSON.stringify([...favs]));
  if(curTab==="search") render();
  else if(curTab==="fav") renderFavs();
}

function goSearch(keyword){
  switchTab("search");
  sq=keyword;
  document.getElementById("si").value=keyword;
  document.getElementById("sc").classList.add("show");
  openSet.clear(); renderKwTags(); render();
}

function tog(id){
  openSet.has(id)?openSet.delete(id):openSet.add(id);
  render();
  setTimeout(()=>{
    const e=document.getElementById("c"+id);
    if(e) e.scrollIntoView({behavior:'smooth',block:'nearest'});
  },60);
}

function clearS(){
  sq=""; document.getElementById("si").value="";
  document.getElementById("sc").classList.remove("show");
  openSet.clear(); renderKwTags(); render();
}

function renderKwTags(){
  const row=document.getElementById("kwRow");
  const terms=sq.trim().split(/\s+/).filter(Boolean);
  if(terms.length<2){ row.classList.remove("show"); row.innerHTML=""; return; }
  row.classList.add("show");
  row.innerHTML=`<span class="kw-label">AND:</span>`+
    terms.map(t=>`<span class="kw-tag">›› ${t}</span>`).join('');
}

document.getElementById("si").addEventListener("input",function(){
  sq=this.value;
  document.getElementById("sc").classList.toggle("show",sq.length>0);
  openSet.clear(); renderKwTags(); render();
});

document.getElementById("devChips").addEventListener("click",function(e){
  const c=e.target.closest(".seg"); if(!c) return;
  ad=c.dataset.v;
  this.querySelectorAll(".seg").forEach(x=>x.classList.remove("on"));
  c.classList.add("on"); openSet.clear(); render();
});

document.getElementById("catChips").addEventListener("click",function(e){
  const c=e.target.closest(".seg"); if(!c) return;
  ac=c.dataset.v;
  this.querySelectorAll(".seg").forEach(x=>x.classList.remove("on"));
  c.classList.add("on"); openSet.clear(); render();
});

// Init
document.getElementById("tabSearch").style.display="block";
document.getElementById("tabAlarm").classList.remove("on");
document.getElementById("tabParts").classList.remove("on");
document.getElementById("tabFav").classList.remove("on");
render();
</script>
</body>
</html>
