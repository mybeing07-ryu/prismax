<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PrisMax Alarm Search · Vantive</title>
<style>
:root{--plum:#72256B;--plum-d:#5C1B56;--plum-light:rgba(114,37,107,0.09);
--cream:#FFFAEB;--pine:#105742;--pine-light:rgba(16,87,66,0.10);
--euca:#6CA07A;--euca-light:rgba(108,160,122,0.12);
--amber:#D4700A;--amber-light:rgba(212,112,10,0.10);
--white:#FFFFFF;--text:#1C1C1E;--text2:#52525B;--text3:#A1A1AA;
--border:rgba(0,0,0,0.07);--border-p:rgba(114,37,107,0.14);
--shadow:0 2px 14px rgba(0,0,0,0.06);--r:14px;--r-xs:5px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,"Segoe UI","Helvetica Neue",Arial,sans-serif;
background:var(--cream);color:var(--text);font-size:14px;min-height:100vh;-webkit-font-smoothing:antialiased;}
.hdr{background:linear-gradient(150deg,var(--plum-d) 0%,var(--plum) 60%,#8B3080 100%);
padding:16px 18px 0;position:sticky;top:0;z-index:200;overflow:hidden;}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;position:relative;z-index:2;}
.wmark-wrap{display:flex;flex-direction:column;gap:4px;}
.wmark-img{height:30px;width:auto;display:block;}
.tagline{font-size:9px;font-weight:700;color:rgba(255,250,235,0.55);letter-spacing:1.8px;text-transform:uppercase;}
.total-badge{background:rgba(255,250,235,0.18);border:1px solid rgba(255,250,235,0.25);
color:var(--cream);font-size:11px;font-weight:700;padding:5px 13px;border-radius:20px;flex-shrink:0;margin-top:2px;}
.s-wrap{position:relative;margin-bottom:10px;z-index:2;}
.s-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);pointer-events:none;}
.s-inp{width:100%;padding:12px 42px 12px 44px;background:rgba(255,250,235,0.13);
border:1.5px solid rgba(255,250,235,0.22);border-radius:12px;font-size:14px;color:var(--cream);
outline:none;font-family:inherit;transition:background .18s,border-color .18s;}
.s-inp:focus{background:rgba(255,250,235,0.22);border-color:rgba(255,250,235,0.45);}
.s-inp::placeholder{color:rgba(255,250,235,0.45);}
.s-clr{position:absolute;right:10px;top:50%;transform:translateY(-50%);
background:rgba(255,250,235,0.22);border:none;border-radius:50%;
width:22px;height:22px;font-size:12px;cursor:pointer;color:var(--cream);
font-weight:700;display:none;line-height:22px;text-align:center;}
.s-clr.show{display:block;}
.s-hint{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding-bottom:12px;
font-size:11px;color:rgba(255,250,235,0.58);position:relative;z-index:2;}
.h-arr{color:rgba(255,250,235,0.75);font-weight:800;letter-spacing:-1px;}
.h-ex{background:rgba(255,250,235,0.14);border:1px solid rgba(255,250,235,0.18);
color:rgba(255,250,235,0.9);border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600;}
.filt{background:var(--cream);padding:12px 18px;border-bottom:1px solid var(--border);}
.flbl{font-size:9.5px;font-weight:800;color:var(--pine);letter-spacing:1.4px;text-transform:uppercase;margin-bottom:7px;}
.seg-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.seg-row::-webkit-scrollbar{display:none;}
.seg{flex-shrink:0;padding:6px 13px;border-radius:20px;font-size:12px;font-weight:600;
cursor:pointer;user-select:none;white-space:nowrap;background:rgba(0,0,0,0.05);color:var(--text2);
border:1.5px solid transparent;transition:all .15s ease;font-family:inherit;display:inline-flex;align-items:center;}
.seg.on{background:var(--plum);color:var(--cream);border-color:var(--plum);}
.seg:active{transform:scale(0.95);}
.sdot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;flex-shrink:0;}
.frow{margin-bottom:10px;}.frow:last-child{margin-bottom:0;}
.sbar{padding:8px 18px 6px;font-size:12px;color:var(--text2);background:var(--cream);}
.sbar b{color:var(--plum);font-weight:700;}
.cards{padding:8px 14px 32px;display:flex;flex-direction:column;gap:9px;}
.card{background:var(--white);border-radius:var(--r);box-shadow:0 2px 14px rgba(0,0,0,0.06);
border:1px solid var(--border);overflow:hidden;}
.chead{display:flex;align-items:flex-start;gap:10px;padding:13px 13px 11px;cursor:pointer;}
.abadge{display:inline-flex;align-items:center;justify-content:center;min-width:52px;padding:3px 7px;
border-radius:var(--r-xs);font-size:10px;font-weight:800;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.aT{background:var(--euca-light);color:var(--pine);border:1px solid rgba(108,160,122,0.28);}
.aB{background:var(--plum-light);color:var(--plum);border:1px solid var(--border-p);}
.pbadge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;}
.p-medium{background:rgba(212,112,10,0.10);color:var(--amber);}
.p-info{background:var(--euca-light);color:var(--pine);}
.p-low{background:rgba(0,0,0,0.05);color:var(--text3);}
.cbadge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;}
.c-alarm{background:var(--plum-light);color:var(--plum);}
.c-system_failure{background:var(--amber-light);color:var(--amber);}
.c-retest{background:var(--pine-light);color:var(--pine);}
.cbody{flex:1;min-width:0;}
.ctitle{font-size:13.5px;font-weight:700;line-height:1.45;margin-bottom:6px;color:var(--text);}
.cmeta{display:flex;flex-wrap:wrap;gap:4px;align-items:center;}
.chev{color:var(--text3);flex-shrink:0;margin-top:2px;width:22px;height:22px;
display:flex;align-items:center;justify-content:center;
background:rgba(0,0,0,0.04);border-radius:50%;transition:transform .25s ease,background .15s,color .15s;}
.chev.open{transform:rotate(180deg);background:var(--plum-light);color:var(--plum);}
.cdet{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1);}
.cdet.open{max-height:1400px;border-top:1px solid var(--border);}
.cdet-in{padding:15px 13px 18px;background:rgba(255,250,235,0.5);}
.dsec{margin-bottom:13px;}.dsec:last-child{margin-bottom:0;}
.dlbl{display:flex;align-items:center;gap:6px;font-size:9.5px;font-weight:800;color:var(--pine);
text-transform:uppercase;letter-spacing:1.2px;margin-bottom:7px;}
.darr{color:var(--plum);font-weight:900;font-size:10px;letter-spacing:-1px;}
.dbox,.abox,.sbox{font-size:13.5px;line-height:1.75;border-radius:10px;padding:11px 13px;}
.dbox{color:var(--text);background:var(--white);border:1px solid var(--border);}
.abox{color:#7a4800;background:var(--amber-light);border:1px solid rgba(212,112,10,0.2);}
.sbox{color:var(--pine);font-weight:500;background:var(--euca-light);border:1px solid rgba(108,160,122,0.25);}
.dbox ul,.abox ul{list-style:none;padding:0;}
.dbox li,.abox li{padding:2px 0 2px 14px;position:relative;}
.dbox li::before,.abox li::before{content:"·";position:absolute;left:4px;color:var(--text3);}
mark{background:rgba(114,37,107,0.13);color:var(--plum);border-radius:2px;padding:0 1px;}
.empty{text-align:center;padding:60px 24px;color:var(--text2);display:none;}
.empty-ico{font-size:46px;margin-bottom:12px;opacity:.4;}
.empty h3{font-size:17px;font-weight:700;margin-bottom:6px;}
.empty p{font-size:13px;}
</style>
</head>

var CF='all',PF='all',SQ='',OS={};
var CK={alarm:'Alarm',system_failure:'System Failure',retest:'Retest'};
var PK={medium:'Medium',info:'Info',low:'Low'};

function eh(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function hl(t,ws){
  var s=eh(t);if(!ws||!ws.length)return s;
  for(var i=0;i<ws.length;i++){var w=ws[i];if(!w)continue;
    var re=new RegExp('('+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    s=s.replace(re,'<mark>$1</mark>');}
  return s;
}
function mkList(arr,ws,cls){
  if(!arr||!arr.length)return '';
  if(arr.length===1)return '<div class="'+cls+'">'+hl(arr[0],ws)+'</div>';
  var li='';for(var i=0;i<arr.length;i++)li+='<li>'+hl(arr[i],ws)+'</li>';
  return '<div class="'+cls+'"><ul>'+li+'</ul></div>';
}
function mkDetail(a,ws){
  var h='';
  if(a.causes&&a.causes.length){h+='<div class="dsec"><div class="dlbl"><span class="darr">&gt;&gt;</span>Cause</div>'+mkList(a.causes,ws,'dbox')+'</div>';}
  if(a.operator_actions&&a.operator_actions.length){h+='<div class="dsec"><div class="dlbl"><span class="darr">&gt;&gt;</span>Operator Actions</div>'+mkList(a.operator_actions,ws,'abox')+'</div>';}
  if(a.service_actions&&a.service_actions.length){h+='<div class="dsec"><div class="dlbl"><span class="darr">&gt;&gt;</span>Service Actions</div>'+mkList(a.service_actions,ws,'dbox')+'</div>';}
  if(a.system_response){h+='<div class="dsec"><div class="dlbl"><span class="darr">&gt;&gt;</span>System Response</div><div class="sbox">'+hl(a.system_response,ws)+'</div></div>';}
  return h;
}
function render(list){
  var ws=SQ?SQ.trim().toLowerCase().split(/\s+/):[];
  var el=document.getElementById('cardsEl');
  var em=document.getElementById('emptyEl');
  document.getElementById('mCnt').textContent=list.length;
  document.getElementById('totalBadge').textContent=list.length;
  if(!list.length){el.innerHTML='';em.style.display='block';return;}
  em.style.display='none';
  var html='';
  for(var i=0;i<list.length;i++){
    var a=list[i];
    var isOpen=!!OS[a.code+'_'+i];
    var cp=(a.code&&a.code.charAt(0)==='T')?'aT':'aB';
    var oc='onclick="tog('+i+',&#39;'+eh(a.code)+'&#39;)"';
    html+='<div class="card" id="c'+i+'">';
    html+='<div class="chead" '+oc+'>';
    html+='<span class="abadge '+cp+'">'+hl(a.code,ws)+'</span>';
    html+='<div class="cbody">';
    html+='<div class="ctitle">'+hl(a.name,ws)+'</div>';
    html+='<div class="cmeta">';
    html+='<span class="cbadge c-'+a.category+'">'+(CK[a.category]||eh(a.category))+'</span> ';
    html+='<span class="pbadge p-'+a.priority+'">'+(PK[a.priority]||eh(a.priority))+'</span>';
    html+='</div></div>';
    html+='<div class="chev'+(isOpen?' open':'')+'"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg></div>';
    html+='</div>';
    html+='<div class="cdet'+(isOpen?' open':'')+'" id="d'+i+'">';
    html+='<div class="cdet-in">'+mkDetail(a,ws)+'</div>';
    html+='</div></div>';
  }
  el.innerHTML=html;
}
function tog(i,code){
  var key=code+'_'+i;
  var d=document.getElementById('d'+i);
  var c=document.getElementById('c'+i);
  if(!d||!c)return;
  var cv=c.querySelector('.chev');
  if(OS[key]){delete OS[key];d.classList.remove('open');if(cv)cv.classList.remove('open');}
  else{OS[key]=1;d.classList.add('open');if(cv)cv.classList.add('open');}
}
function go(){
  var ws=SQ?SQ.trim().toLowerCase().split(/\s+/):[];
  var list=ALARMS.slice();
  if(CF!=='all')list=list.filter(function(a){return a.category===CF;});
  if(PF!=='all')list=list.filter(function(a){return a.priority===PF;});
  if(ws.length)list=list.filter(function(a){
    var h=[a.code||'',a.name||'',
      (a.causes||[]).join(' '),(a.operator_actions||[]).join(' '),
      (a.service_actions||[]).join(' '),a.system_response||''
    ].join(' ').toLowerCase();
    return ws.every(function(w){return h.indexOf(w)>=0;});
  });
  OS={};render(list);
}
var sInp=document.getElementById('sInp');
var sClr=document.getElementById('sClr');
sInp.addEventListener('input',function(){SQ=sInp.value;sClr.className=SQ.length?'s-clr show':'s-clr';go();});
sClr.addEventListener('click',function(){sInp.value='';SQ='';sClr.className='s-clr';go();});
document.getElementById('catRow').addEventListener('click',function(e){
  var b=e.target;while(b&&!b.classList.contains('seg'))b=b.parentElement;
  if(!b)return;
  document.querySelectorAll('#catRow .seg').forEach(function(x){x.classList.remove('on');});
  b.classList.add('on');CF=b.getAttribute('data-v');go();
});
document.getElementById('prioRow').addEventListener('click',function(e){
  var b=e.target;while(b&&!b.classList.contains('seg'))b=b.parentElement;
  if(!b)return;
  document.querySelectorAll('#prioRow .seg').forEach(function(x){x.classList.remove('on');});
  b.classList.add('on');PF=b.getAttribute('data-v');go();
});
go();
